name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Kavi274
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#A855F7&color_dots=#1a1a2e,#2d1b4e,#6b21a8,#9333ea,#c084fc
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#A855F7

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
